    description: >
      Current market commentary raised concern that some headline AI earnings strength may include
      non-operating or unrealized gains from private AI investments. The proper trade-bot treatment is
      news/context only: do not score it, size from it, or promote it without future filing-derived
      evidence and ablation support.

