  - event_id: openai_financials_zitron_2026_06_15
    name: OpenAI audited financials raise AI unit-economics concern
    date: "2026-06-15"
    category: ai_unit_economics
    direction: escalation
    current: true
    phase: leading_warning
    phase_reason: >
      Audited/private-company financial disclosure may precede full repricing across public
      AI-capex beneficiaries.
    confirmation_window: >
      Watch 1d/5d/21d confirmation in QQQ, XLK, SMH, SOXX, IGV, hyperscalers, HYG/LQD,
      and VIXY.
    tags:
      - ai
      - openai
      - ai_capex
      - hyperscalers
      - semiconductors
      - concentration
      - private_markets
      - leading_warning
    source_url: "https://www.wheresyoured.at/exclusive-openai-financials/"
    description: >
      Ed Zitron reported audited OpenAI financials for 2024 and 2025, including sharply
      higher spending and losses. The tradable question is whether AI revenue growth can
      still justify public-market AI capex, semiconductor leadership, hyperscaler margins,
      and mega-cap concentration.

