    category: ai_unit_economics
    direction: escalation
    current: true
    sizing_authority: false
    phase: leading_warning
    phase_reason: >
      Public commentary flagged the possibility that private AI investment marks, other-income gains,
      and circular financing relationships can make reported earnings look stronger than operating
      cash economics. This is relevant context, but trade-bot does not have direct historical private
